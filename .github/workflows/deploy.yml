name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e

            if [ ! -d ~/ecommerce-agent ]; then
              git clone https://github.com/x-glacialdream/ecommerce-agent.git ~/ecommerce-agent
            fi

            cd ~/ecommerce-agent
            git fetch origin
            git reset --hard origin/main

            docker rm -f ecommerce-agent || true
            docker build -t ecommerce-agent:latest .

            docker run -d --name ecommerce-agent -p 8000:8000 \
              -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              -e GEMINI_MODEL="${{ secrets.GEMINI_MODEL }}" \
              ecommerce-agent:latest
          EOF